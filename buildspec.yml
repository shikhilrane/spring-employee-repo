version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo Installing Maven...
  pre_build:
    commands:
      - echo Logging in to Docker hub...
      - echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin # Use to add docker hub username and password
  build:
    commands:
      - echo Building, Testing and packaging the application... # print this particular string inside the logs
      - mvn package # 3. This will allow to run test cases with docker image as we have used TestContainers in our testing
      # - mvn package -DskipTests # 2. it will skip the tests
      # - mvn package # 1. it will run the package command and also tests
  post_build:
    commands:
      - echo Built, Testing and packaging completed.  # Not that important, it will print this in log after build
artifacts:
  files:
    - target/*.jar  # Next build phase (Deployment phase) will get artifact file from this folder which has .jar extension
  discard-paths: yes
cache:
  paths:
    - '/root/.m2/**/*'

# There are 3 parts
# 1. Phases
# 2. artifacts
# 3. cache